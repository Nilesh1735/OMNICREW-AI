repos:
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.63.7 # Use a recent version
    hooks:
      - id: trufflehog
        name: TruffleHog
        description: Detect secrets in your data.
        entry: bash -c 'trufflehog git file:// --since-commit HEAD --fail-detected --no-update'
        language: system
        pass_filenames: false